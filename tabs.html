<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Tab Manager</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <h2>Chrome Windows and Tabs <button id="import-tabs-btn" style="float: right; margin-top: 5px; font-size: 0.6em; padding: 5px 10px; cursor: pointer;">Import Tabs</button></h2>
    <div id="windows-container"></div>

    <div id="import-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 style="margin-top: 0;">Import List of Tabs</h3>
            <p>Paste your list of URLs below:</p>
            <textarea id="import-urls" rows="10" style="width: 100%; box-sizing: border-box; resize: vertical; margin-bottom: 10px;" placeholder="1. https://example.com&#10;2. https://google.com"></textarea>
            <button id="import-open-btn" style="padding: 8px 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">Open in New Window</button>
        </div>
    </div>

    <script type="module" src="dist/tabs.js"></script>
</body>

</html>
