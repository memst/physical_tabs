<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Tab Saver</title>
  <style>
    body {
      font-family: sans-serif;
      width: 250px;
      padding: 10px;
    }

    button {
      display: block;
      margin: 8px 0;
      width: 100%;
      padding: 8px;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>

<body>
  <h3>Tab Saver</h3>
  <button id="save">💾 Save Tabs</button>
  <button id="load">📂 Restore Tabs</button>
  <button id="append">💾📂 Append Tabs</button>
  <button id="manage">🔍 Show All Windows & Tabs</button>
  <button id="makeWorkspace">✨ Make this a Managed Window</button>
  <button id="createWorkspace">✨ Create a Managed Window</button>
  <button id="setFolder">📁 Set Backup Folder</button>
  <div id="folderStatus" style="font-size: 0.8em; color: #666; text-align: center;">Folder: Not set</div>
  <hr>
  <input type="file" id="fileInput" accept=".json">
  <input type="file" id="appendInput" accept=".json">
  <script type="module" src="dist/popup.js"></script>
</body>

</html>
