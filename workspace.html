<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Workspace Manager</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        #window-info {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .workspace-name {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .workspace-name input {
            font-size: 1.2em;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .workspace-name button {
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .workspace-name button:hover {
            background-color: #45a049;
        }

        .workspace-name .saved-indicator {
            color: #4CAF50;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .workspace-name .saved-indicator.show {
            opacity: 1;
        }
    </style>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div class="workspace-name">
        <input type="text" id="workspaceName" placeholder="Enter workspace name">
        <button id="saveWorkspaceName">Save</button>
        <span class="saved-indicator" id="savedIndicator">✓ Saved</span>
    </div>
    <div id="window-info"></div>
    <div id="workspaces-container"></div>
    <script type="module" src="dist/workspace.js"></script>
</body>

</html>
